plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    compileSdk 27

    defaultConfig {
        applicationId "com.usbcamera.viewer"
        minSdk 21
        targetSdk 27
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.5.31"
}
